name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # 2. Build all date folders into a deployable site folder
      - name: Build date projects
        run: |
          mkdir -p site
          for dir in */; do
            if [[ "$dir" =~ ^[0-9]{8}/$ ]] && [[ -f "${dir}package.json" ]]; then
              echo "Building $dir"
              npm ci --prefix "$dir"
              npm run build --prefix "$dir" -- --outDir "../site/${dir%/}"
            fi
          done

      # 3. Generate index.html for the site root
      - name: Build index
        run: |
          node scripts/build-index.mjs --out site/index.html

      # 4. Configure Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 5. Upload artifact for GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
