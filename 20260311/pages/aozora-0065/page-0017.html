    <article>DOC_ID:aozora-0065 | PAGE:17 | LINES:641-655<br>金襴緞子のオビしめて<br>ふりのたもとのキモノきて<br>丹塗のポクリねもかろく<br>からこんからことゆきやるゆえ<br>どこへゆきやるときいたらば<br>娘ざかりぢや花ぢやもの<br>後生よいよに寺まゐり。<br>寺まゐり。<br>　白壁へ<br>ふたりはかきぬ。<br>「しらぬこと」<br>ふたりはかきぬ。<br>「よろこび」と<br>ふたりはかきぬ。<br>「さよなら」と。<br>---</article>
