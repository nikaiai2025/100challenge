    <article>DOC_ID:aozora-0098 | PAGE:10 | LINES:361-368<br>長順　やよ、お鶴どの。四辺に人は見えぬかいな。<br>白萩　（四下を見廻して）いやいや、誰も見えぬわいな。今宵は月も出ぬさうな。<br>長順　やよ、お鶴どの。もそつと近う其方の耳を貸しや。<br>白萩　あい。<br>長順　（言葉を改めて）やよ、鶴。昔其方に恋ひこがれた、あの時の心がいとしいわい、あの時あの恋がかなうたなら、何も不可思議は欲しうは無かつたのぢや。（長順瞑目す）<br>門内の鐘声、小鐘声を以て終る。<br>幕<br>（明治四十二年二月）<br>---</article>
