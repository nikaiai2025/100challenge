    <article>DOC_ID:aozora-0097 | PAGE:3 | LINES:81-87<br>　ああ。何という恐ろしい責め苦でしょう。この美しい、楽しい島はもうスッカリ地獄です。<br>　神様、神様。あなたはなぜ私たち二人を、一思いに屠殺して下さらないのですか…………。<br>――太郎記す………<br>◇第三の瓶の内容<br>　オ父サマ。オ母サマ。ボクタチ兄ダイハ、ナカヨク、タッシャニ、コノシマニ、クラシテイマス。ハヤク、タスケニ、キテクダサイ。<br>市川　太郎<br>イチカワ　アヤコ<br>---</article>
