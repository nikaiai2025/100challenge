    <article>DOC_ID:aozora-0068 | PAGE:28 | LINES:1081-1092<br>※<br>されば要は、熱情の問題である。<br>汝、心の底より立腹せば<br>怒れよ！<br>さあれ、怒ることこそ<br>汝が最後なる目標の前にであれ、<br>この言ゆめゆめおろそかにする勿れ。<br>そは、熱情はひととき持続し、やがて熄むなるに、<br>その社会的効果は存続し、<br>汝が次なる行為への転調の障げとなるなれば。<br>IIII<br>ゆふがた、空の下で、身一点に感じられれば、万事に於て文句はないのだ。<br>---</article>
