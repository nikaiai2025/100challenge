    <article>DOC_ID:aozora-0047 | PAGE:33 | LINES:1281-1291<br>天津日に捧ぐる香は、<br>浄まはる潮のにほひ、<br>轟く波凝、動がぬ岩根、靡く藻よ。<br>黒金の船の舳先よ、<br>岬代赭色に、獅子の蹈留れる如く、<br>足を延べたるこゝ、入海のひたおもて、<br>うちひさす都のまちは、<br>煩悶の壁に悩めど、<br>鏡なす白川は蜘手に流れ、<br>風のみひとり、たまさぐる、<br>洞穴口の花の錦や。<br>---</article>
