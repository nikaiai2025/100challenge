    <article>DOC_ID:aozora-0045 | PAGE:23 | LINES:881-888<br>けふの暑さはたばこやにたばこがない<br>月は澄みわたり刑務所のまうへ<br>九月、四国巡礼の旅へ<br>鴉とんでゆく水をわたらう<br>　三年ぶりに句稿（昭和十三年七月―十四年九月）を整理して七十二句ほど拾ひあげた。<br>　所詮は自分を知ることである。私は私の愚を守らう。<br>（昭和十五年二月、御幸山麓一草庵にて　山頭火）<br>（昭和十五年四月刊）<br>---</article>
