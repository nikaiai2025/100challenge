<!doctype html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDD/BDD中心のAIエージェンティック開発フレームワーク</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --border: #e5e5e7;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --accent: #0071e3;
      --code-bg: #f2f2f4;
      --code-block-bg: #1d1d1f;
      --code-block-fg: #f5f5f7;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      --radius: 14px;
      --toc-width: 280px;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 2rem;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(245, 245, 247, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .topbar a {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
    }

    .topbar a:hover {
      text-decoration: underline;
    }

    .topbar-title {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-sep {
      color: var(--border);
      user-select: none;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      max-width: 1280px;
      margin: 0 auto;
    }

    /* ── TOC sidebar ── */
    .toc {
      position: sticky;
      top: 3.2rem;
      align-self: flex-start;
      width: var(--toc-width);
      min-width: var(--toc-width);
      height: calc(100vh - 3.2rem);
      overflow-y: auto;
      padding: 1.5rem 1rem 2rem 2rem;
      border-right: 1px solid var(--border);
      font-size: 0.78rem;
      scrollbar-width: thin;
    }

    .toc-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }

    .toc ul {
      list-style: none;
    }

    .toc li {
      margin-bottom: 0.25rem;
    }

    .toc a {
      display: block;
      padding: 0.2rem 0.5rem;
      color: var(--muted);
      text-decoration: none;
      border-radius: 6px;
      transition: all 0.15s ease;
      line-height: 1.4;
    }

    .toc a:hover {
      color: var(--text);
      background: rgba(0, 0, 0, 0.04);
    }

    .toc a.active {
      color: var(--text);
      font-weight: 600;
      background: rgba(0, 0, 0, 0.04);
    }

    .toc .toc-h2 {
      padding-left: 1rem;
      font-size: 0.75rem;
    }

    .toc .toc-h3 {
      padding-left: 1.8rem;
      font-size: 0.72rem;
    }

    /* ── TOC toggle (mobile) ── */
    .toc-toggle {
      display: none;
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 50;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      color: var(--text);
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      min-width: 0;
      padding: 2.5rem 3rem 5rem;
    }

    /* ── Markdown styles ── */
    .md h1 {
      font-size: 2rem;
      font-weight: 800;
      margin: 3rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border);
      line-height: 1.2;
    }

    .md h1:first-child {
      margin-top: 0;
    }

    .md h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 2.5rem 0 0.8rem;
      line-height: 1.3;
    }

    .md h3 {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 2rem 0 0.6rem;
      line-height: 1.3;
    }

    .md h4 {
      font-size: 1rem;
      font-weight: 700;
      margin: 1.5rem 0 0.5rem;
    }

    .md p {
      margin: 0.6rem 0;
    }

    .md hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .md ul,
    .md ol {
      margin: 0.6rem 0 0.6rem 1.4rem;
    }

    .md li {
      margin: 0.3rem 0;
    }

    .md li > ul,
    .md li > ol {
      margin-top: 0.2rem;
      margin-bottom: 0.2rem;
    }

    .md strong {
      font-weight: 700;
    }

    .md a {
      color: var(--accent);
      text-decoration: none;
    }

    .md a:hover {
      text-decoration: underline;
    }

    /* Inline code */
    .md code {
      background: var(--code-bg);
      padding: 0.15rem 0.4rem;
      border-radius: 5px;
      font-family: 'SF Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.88em;
    }

    /* Code blocks */
    .md pre {
      background: var(--code-block-bg);
      color: var(--code-block-fg);
      padding: 1.2rem 1.4rem;
      border-radius: 12px;
      overflow-x: auto;
      margin: 1rem 0;
      font-size: 0.85rem;
      line-height: 1.6;
    }

    .md pre code {
      background: transparent;
      padding: 0;
      color: inherit;
      font-size: inherit;
    }

    /* Tables */
    .md table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.9rem;
    }

    .md thead th {
      background: var(--code-bg);
      font-weight: 700;
      text-align: left;
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .md tbody td {
      padding: 0.55rem 0.8rem;
      border: 1px solid var(--border);
      vertical-align: top;
    }

    .md tbody tr:hover {
      background: rgba(0, 0, 0, 0.015);
    }

    /* Blockquote */
    .md blockquote {
      border-left: 3px solid var(--accent);
      margin: 1rem 0;
      padding: 0.6rem 1rem;
      background: rgba(0, 113, 227, 0.04);
      border-radius: 0 8px 8px 0;
      color: var(--text);
    }

    .md blockquote p {
      margin: 0.3rem 0;
    }

    /* ── Responsive ── */
    @media (max-width: 960px) {
      .toc {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 45;
        width: 280px;
        height: 100vh;
        background: var(--surface);
        border-right: 1px solid var(--border);
        box-shadow: 4px 0 24px rgba(0, 0, 0, 0.1);
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        padding-top: 4rem;
      }

      .toc.is-open {
        transform: translateX(0);
      }

      .toc-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .toc-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 44;
        background: rgba(0, 0, 0, 0.3);
      }

      .toc-overlay.is-open {
        display: block;
      }

      .main {
        padding: 2rem 1.25rem 4rem;
      }

      .md h1 {
        font-size: 1.5rem;
      }

      .md h2 {
        font-size: 1.2rem;
      }

      .md pre {
        font-size: 0.8rem;
        padding: 1rem;
      }

      .md table {
        font-size: 0.82rem;
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>

<body>
  <div class="topbar">
    <a href="../">&larr; 100 Challenge</a>
    <span class="topbar-sep">|</span>
    <span class="topbar-title">SDD/BDD中心のAIエージェンティック開発フレームワーク</span>
  </div>

  <div class="layout">
    <nav class="toc" id="toc">
      <p class="toc-label">Contents</p>
      <ul id="tocList"></ul>
    </nav>
    <div class="toc-overlay" id="tocOverlay"></div>

    <main class="main">
      <article class="md" id="content">
        <p style="color:var(--muted)">読み込み中...</p>
      </article>
    </main>
  </div>

  <button class="toc-toggle" id="tocToggle" type="button" aria-label="目次を開く">&#9776;</button>

  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script>
    (async () => {
      const content = document.getElementById('content');
      const tocList = document.getElementById('tocList');
      const toc = document.getElementById('toc');
      const tocOverlay = document.getElementById('tocOverlay');
      const tocToggle = document.getElementById('tocToggle');

      // Fetch & render markdown
      try {
        const res = await fetch('framework.md');
        if (!res.ok) throw new Error(res.statusText);
        const md = await res.text();
        content.innerHTML = marked.parse(md);
      } catch (e) {
        content.innerHTML = '<p style="color:red">Markdownの読み込みに失敗しました: ' + e.message + '</p>';
        return;
      }

      // Build TOC from rendered headings
      const headings = content.querySelectorAll('h1, h2, h3');
      headings.forEach((h, i) => {
        const id = 'sec-' + i;
        h.id = id;
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = h.textContent;
        a.className = 'toc-' + h.tagName.toLowerCase();
        a.addEventListener('click', () => closeToc());
        li.appendChild(a);
        tocList.appendChild(li);
      });

      // Active heading tracking
      const tocLinks = tocList.querySelectorAll('a');
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              tocLinks.forEach((a) => a.classList.remove('active'));
              const active = tocList.querySelector('a[href="#' + entry.target.id + '"]');
              if (active) active.classList.add('active');
            }
          });
        },
        { rootMargin: '-60px 0px -80% 0px', threshold: 0 }
      );
      headings.forEach((h) => observer.observe(h));

      // Mobile TOC toggle
      const closeToc = () => {
        toc.classList.remove('is-open');
        tocOverlay.classList.remove('is-open');
      };

      tocToggle.addEventListener('click', () => {
        const open = toc.classList.toggle('is-open');
        tocOverlay.classList.toggle('is-open', open);
      });

      tocOverlay.addEventListener('click', closeToc);
    })();
  </script>
</body>

</html>
