<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>100 Challenge — Projects</title>
    <meta name="description" content="100日間チャレンジのプロジェクト一覧ページ" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f5f5f7;
            --surface: #ffffff;
            --border: #e5e5e7;
            --text: #1d1d1f;
            --muted: #6e6e73;
            --accent: #1d1d1f;
            --accent2: #6e6e73;
            --shadow: 0 18px 45px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 4rem 2rem 6rem;
        }

        /* Hero */
        .hero {
            margin-bottom: 4rem;
        }

        .hero-eyebrow {
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-size: clamp(2.2rem, 6vw, 3.5rem);
            font-weight: 800;
            line-height: 1.1;
            color: var(--text);
            margin-bottom: 1.25rem;
        }

        .hero p {
            font-size: 1.1rem;
            color: var(--muted);
            max-width: 560px;
            line-height: 1.7;
        }

        /* Section */
        .section-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.25rem;
        }

        /* Cards grid */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.25rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.75rem;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.02));
            opacity: 0;
            transition: opacity 0.25s;
        }

        .card:hover {
            border-color: #d1d1d6;
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-date {
            font-size: 0.75rem;
            color: var(--muted);
            font-weight: 500;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.875rem;
            color: var(--muted);
            line-height: 1.6;
            flex: 1;
        }

        .card-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.3rem 0.65rem;
            border-radius: 999px;
            background: #f2f2f4;
            color: var(--muted);
            width: fit-content;
            letter-spacing: 0.03em;
        }

        .card-arrow {
            font-size: 1rem;
            color: var(--text);
            margin-top: auto;
            opacity: 0;
            transform: translateX(-4px);
            transition: all 0.2s ease;
        }

        .card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        footer {
            margin-top: 5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="container">
        <section class="hero">
            <p class="hero-eyebrow">Projects</p>
            <h1>100 Challenge</h1>
            <p>100日間のプログラミングチャレンジです。毎日作ったものを置いていきます。</p>
        </section>

        <p class="section-label">作品一覧</p>
        <div class="cards">

            <a class="card" href="./20260310/">
                <span class="card-date">2026-03-10</span>
                <span class="card-title">Multi-Provider AI Explorer</span>
                <span class="card-desc">1つのプロンプトを10のAIプロバイダー（Gemini, Groq, Mistral
                    など）へ同時送信して結果を比較するツール。APIキーはBYOK方式。</span>
                <span class="card-tag">⚡ React + Vite</span>
                <span class="card-arrow">→</span>
            </a>

            <!-- 次のプロジェクトはここに追加 -->

        </div>

        <footer>
            <p>Built with curiosity — 2026</p>
        </footer>
    </div>
</body>

</html>
